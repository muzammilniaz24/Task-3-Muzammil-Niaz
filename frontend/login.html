<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GrandStay Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container py-5" style="max-width: 420px; margin-top: 120px;">
        <div class="content-card">
            <h4 class="section-title mb-4"><i class="bi bi-shield-lock"></i> Admin Login</h4>
            <div id="loginAlert"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">Sign In</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <a href="public.html">Browse rooms as guest</a>
            </p>
        </div>
    </main>
    <script>
        const TOKEN_KEY = 'hotel_admin_token';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Login failed');

                sessionStorage.setItem(TOKEN_KEY, data.token);
                window.location.href = 'index.html';
            } catch (err) {
                document.getElementById('loginAlert').innerHTML =
                    `<div class="alert alert-danger">${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
